version: "3.9"

services:
  homekit-bridge:
    build: .
    container_name: homekit-bridge
    restart: unless-stopped
    # host network is required for HAP mDNS/Bonjour discovery and for the
    # CCU3 XML-RPC callback server to be reachable from the CCU3
    network_mode: host
    volumes:
      - ./state:/app/state
    env_file:
      - .env
    environment:
      STATE_DIR: /app/state
