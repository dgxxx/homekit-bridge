version: "3.9"

services:
  homekit-bridge:
    build: .
    container_name: homekit-bridge
    restart: unless-stopped
    # host network is required for HAP mDNS/Bonjour discovery and for
    # MQTT broker access (127.0.0.1:1883 on the host)
    network_mode: host
    volumes:
      - ./state:/app/state
    env_file:
      - .env
    environment:
      STATE_DIR: /app/state
